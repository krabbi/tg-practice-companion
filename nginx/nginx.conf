server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Must allow the largest per-kind upload (audio); the backend enforces the
    # real per-kind caps (image vs audio) and returns a friendly 413. Driven by
    # the same env var the backend uses, via the nginx image's envsubst
    # templating (see docker-compose nginx service).
    client_max_body_size ${MEDIA_MAX_AUDIO_BYTES};

    location /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
