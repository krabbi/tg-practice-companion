<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 48" width="80" height="48" shape-rendering="crispEdges" role="img" aria-label="Потягивающийся кот">
  <!-- Ginger cat stretching horizontally: paws forward, butt up -->
  <!-- Head on left -->
  <rect x="4" y="16" width="20" height="16" fill="#e8853a"/>
  <rect x="4" y="12" width="6" height="6" fill="#e8853a"/>
  <rect x="14" y="12" width="6" height="6" fill="#e8853a"/>
  <!-- ear inner -->
  <rect x="5" y="13" width="3" height="3" fill="#f4a96b"/>
  <rect x="15" y="13" width="3" height="3" fill="#f4a96b"/>
  <!-- face highlight -->
  <rect x="6" y="18" width="14" height="10" fill="#f0a060"/>
  <!-- eyes (squint, stretching effort) -->
  <rect x="8" y="21" width="4" height="2" fill="#1a1a1a"/>
  <rect x="16" y="21" width="4" height="2" fill="#1a1a1a"/>
  <!-- nose -->
  <rect x="12" y="25" width="4" height="2" fill="#d9742b"/>
  <!-- mouth -->
  <rect x="10" y="27" width="2" height="2" fill="#1a1a1a"/>
  <rect x="16" y="27" width="2" height="2" fill="#1a1a1a"/>
  <!-- whiskers -->
  <rect x="0" y="23" width="6" height="1" fill="#d0d0d0"/>
  <rect x="0" y="26" width="6" height="1" fill="#d0d0d0"/>
  <!-- neck / front legs stretched forward -->
  <rect x="24" y="24" width="6" height="8" fill="#e8853a"/>
  <rect x="30" y="28" width="8" height="6" fill="#e8853a"/>
  <rect x="38" y="30" width="8" height="4" fill="#e8853a"/>
  <!-- front paws on ground -->
  <rect x="2" y="34" width="10" height="4" fill="#d9742b"/>
  <!-- front arms stretched -->
  <rect x="12" y="30" width="12" height="4" fill="#e8853a"/>
  <rect x="0" y="34" width="14" height="4" fill="#e8853a"/>
  <!-- body arched -->
  <rect x="44" y="20" width="16" height="12" fill="#e8853a"/>
  <rect x="46" y="22" width="12" height="8" fill="#f0a060"/>
  <!-- back legs / haunches up -->
  <rect x="56" y="16" width="12" height="12" fill="#e8853a"/>
  <rect x="60" y="12" width="8" height="8" fill="#e8853a"/>
  <!-- back paws -->
  <rect x="60" y="32" width="12" height="4" fill="#d9742b"/>
  <rect x="56" y="28" width="8" height="8" fill="#e8853a"/>
  <!-- tail up and curved -->
  <rect x="70" y="8" width="4" height="8" fill="#d9742b"/>
  <rect x="68" y="14" width="4" height="6" fill="#d9742b"/>
  <rect x="66" y="20" width="4" height="4" fill="#d9742b"/>
  <!-- stripes on body -->
  <rect x="46" y="22" width="2" height="8" fill="#d9742b"/>
  <rect x="52" y="22" width="2" height="8" fill="#d9742b"/>
</svg>
