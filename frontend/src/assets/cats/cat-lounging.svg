<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 48" width="80" height="48" shape-rendering="crispEdges" role="img" aria-label="Развалившийся кот">
  <!-- Ginger cat lounging/sprawled on its side, relaxed -->
  <!-- Head (on right side, lying down) -->
  <rect x="52" y="12" width="20" height="16" fill="#e8853a"/>
  <!-- ears -->
  <rect x="56" y="8" width="6" height="6" fill="#e8853a"/>
  <rect x="66" y="8" width="6" height="6" fill="#e8853a"/>
  <rect x="57" y="9" width="3" height="3" fill="#f4a96b"/>
  <rect x="67" y="9" width="3" height="3" fill="#f4a96b"/>
  <!-- face highlight -->
  <rect x="54" y="14" width="14" height="10" fill="#f0a060"/>
  <!-- half-closed lazy eyes -->
  <rect x="56" y="17" width="4" height="3" fill="#1a1a1a"/>
  <rect x="64" y="17" width="4" height="3" fill="#1a1a1a"/>
  <rect x="57" y="17" width="2" height="1" fill="#ffffff"/>
  <rect x="65" y="17" width="2" height="1" fill="#ffffff"/>
  <!-- sleepy drooped eyelids -->
  <rect x="56" y="16" width="4" height="2" fill="#e8853a"/>
  <rect x="64" y="16" width="4" height="2" fill="#e8853a"/>
  <!-- nose -->
  <rect x="60" y="22" width="4" height="2" fill="#d9742b"/>
  <!-- relaxed mouth -->
  <rect x="58" y="24" width="2" height="2" fill="#1a1a1a"/>
  <rect x="64" y="24" width="2" height="2" fill="#1a1a1a"/>
  <!-- whiskers -->
  <rect x="70" y="20" width="8" height="1" fill="#d0d0d0"/>
  <rect x="70" y="23" width="8" height="1" fill="#d0d0d0"/>
  <rect x="44" y="20" width="8" height="1" fill="#d0d0d0"/>
  <rect x="44" y="23" width="8" height="1" fill="#d0d0d0"/>
  <!-- body sprawled horizontally -->
  <rect x="14" y="24" width="42" height="14" fill="#e8853a"/>
  <rect x="18" y="26" width="34" height="10" fill="#f0a060"/>
  <!-- back haunches -->
  <rect x="10" y="22" width="12" height="16" fill="#e8853a"/>
  <!-- back paws stretched out -->
  <rect x="2" y="32" width="14" height="6" fill="#e8853a"/>
  <rect x="2" y="36" width="12" height="4" fill="#d9742b"/>
  <!-- front paws extended lazily -->
  <rect x="48" y="34" width="14" height="4" fill="#e8853a"/>
  <rect x="50" y="36" width="12" height="4" fill="#d9742b"/>
  <!-- tail curled under/behind -->
  <rect x="4" y="24" width="4" height="8" fill="#d9742b"/>
  <rect x="4" y="20" width="4" height="4" fill="#d9742b"/>
  <rect x="8" y="18" width="4" height="4" fill="#d9742b"/>
  <!-- body stripes -->
  <rect x="22" y="26" width="2" height="10" fill="#d9742b"/>
  <rect x="30" y="26" width="2" height="10" fill="#d9742b"/>
  <rect x="38" y="26" width="2" height="10" fill="#d9742b"/>
</svg>
