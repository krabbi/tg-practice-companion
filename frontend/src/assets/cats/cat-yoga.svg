<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
  <!-- Ginger cat doing yoga: arms/paws raised up in victory/warrior pose -->
  <!-- Ears -->
  <rect x="22" y="2" width="6" height="6" fill="#e8853a"/>
  <rect x="36" y="2" width="6" height="6" fill="#e8853a"/>
  <rect x="24" y="4" width="2" height="2" fill="#f4a96b"/>
  <rect x="38" y="4" width="2" height="2" fill="#f4a96b"/>
  <!-- Head -->
  <rect x="18" y="8" width="28" height="20" fill="#e8853a"/>
  <rect x="14" y="12" width="4" height="12" fill="#e8853a"/>
  <rect x="46" y="12" width="4" height="12" fill="#e8853a"/>
  <!-- Face highlight -->
  <rect x="22" y="10" width="20" height="14" fill="#f0a060"/>
  <!-- Happy open eyes -->
  <rect x="22" y="16" width="6" height="4" fill="#1a1a1a"/>
  <rect x="36" y="16" width="6" height="4" fill="#1a1a1a"/>
  <rect x="23" y="17" width="2" height="2" fill="#ffffff"/>
  <rect x="37" y="17" width="2" height="2" fill="#ffffff"/>
  <!-- Nose -->
  <rect x="29" y="22" width="6" height="3" fill="#d9742b"/>
  <!-- Big smile -->
  <rect x="26" y="24" width="4" height="2" fill="#1a1a1a"/>
  <rect x="34" y="24" width="4" height="2" fill="#1a1a1a"/>
  <rect x="28" y="26" width="8" height="2" fill="#1a1a1a"/>
  <!-- Whiskers -->
  <rect x="4" y="20" width="10" height="2" fill="#d0d0d0"/>
  <rect x="50" y="20" width="10" height="2" fill="#d0d0d0"/>
  <!-- Arms raised up in V -->
  <rect x="4" y="8" width="4" height="4" fill="#e8853a"/>
  <rect x="8" y="12" width="4" height="4" fill="#e8853a"/>
  <rect x="12" y="16" width="4" height="12" fill="#e8853a"/>
  <!-- Left paw -->
  <rect x="4" y="6" width="6" height="4" fill="#d9742b"/>
  <!-- Right arm raised -->
  <rect x="56" y="8" width="4" height="4" fill="#e8853a"/>
  <rect x="52" y="12" width="4" height="4" fill="#e8853a"/>
  <rect x="48" y="16" width="4" height="12" fill="#e8853a"/>
  <!-- Right paw -->
  <rect x="54" y="6" width="6" height="4" fill="#d9742b"/>
  <!-- Body -->
  <rect x="18" y="28" width="28" height="16" fill="#e8853a"/>
  <!-- Belly -->
  <rect x="22" y="30" width="20" height="12" fill="#f0a060"/>
  <!-- Legs in pose -->
  <rect x="16" y="44" width="10" height="8" fill="#e8853a"/>
  <rect x="38" y="44" width="10" height="8" fill="#e8853a"/>
  <!-- Feet -->
  <rect x="14" y="52" width="12" height="4" fill="#d9742b"/>
  <rect x="38" y="52" width="12" height="4" fill="#d9742b"/>
  <!-- Tail up -->
  <rect x="48" y="36" width="4" height="4" fill="#d9742b"/>
  <rect x="52" y="32" width="4" height="4" fill="#d9742b"/>
  <rect x="56" y="28" width="4" height="4" fill="#d9742b"/>
  <!-- Forehead stripe -->
  <rect x="29" y="8" width="6" height="2" fill="#d9742b"/>
</svg>
