services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: practice
      POSTGRES_USER: ${POSTGRES_USER:-practice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - practice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-practice} -d practice"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    image: ghcr.io/krabbi/tg-practice-companion:latest
    profiles: ["bot"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Verify that the bot process (pid 1) is alive, which means the entrypoint
      # completed `alembic upgrade head` and handed off to `python -m bot`.
      # start_period covers the time alembic needs to apply all pending migrations.
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-practice}:${POSTGRES_PASSWORD}@db/practice
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS:?ALLOWED_USER_IDS is required}
      MONTHLY_COST_LIMIT_USD: ${MONTHLY_COST_LIMIT_USD:-10.0}
      ANALYSIS_COST_CAP_USD: ${ANALYSIS_COST_CAP_USD:-0.05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SEND_WINDOW_START: ${SEND_WINDOW_START:-6}
      SEND_WINDOW_END: ${SEND_WINDOW_END:-22}

  bot-dev:
    build:
      context: .
      target: dev
    profiles: ["bot-dev"]
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-practice}:${POSTGRES_PASSWORD}@db/practice
    volumes:
      - .:/app

  web:
    build:
      context: .
      target: base
    profiles: ["web"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command:
      - uvicorn
      - web.main:create_app
      - --factory
      - --host
      - "0.0.0.0"
      - --port
      - "${WEB_PORT:-8000}"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-practice}:${POSTGRES_PASSWORD}@db/practice
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS:?ALLOWED_USER_IDS is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:?S3_ENDPOINT_URL is required}
      S3_REGION: ${S3_REGION:?S3_REGION is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      S3_PRESIGN_EXPIRY_SECONDS: ${S3_PRESIGN_EXPIRY_SECONDS:-900}
      MEDIA_MAX_IMAGE_BYTES: ${MEDIA_MAX_IMAGE_BYTES:-10485760}
      MEDIA_MAX_AUDIO_BYTES: ${MEDIA_MAX_AUDIO_BYTES:-52428800}
      MEDIA_MAX_VIDEO_BYTES: ${MEDIA_MAX_VIDEO_BYTES:-262144000}

  nginx:
    image: nginx:alpine
    profiles: ["web"]
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${NGINX_PORT:-4100}:80"
    environment:
      # Shared with the web service; nginx must allow the largest per-kind cap
      # (video). Injected into the config via the image's envsubst templating.
      MEDIA_MAX_VIDEO_BYTES: ${MEDIA_MAX_VIDEO_BYTES:-262144000}
      # Only substitute our var — leave nginx's own $host/$remote_addr untouched.
      NGINX_ENVSUBST_FILTER: "MEDIA_MAX_VIDEO_BYTES"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./frontend/dist:/usr/share/nginx/html:ro

  watchtower:
    image: containrrr/watchtower
    profiles: ["watchtower"]
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 --cleanup

volumes:
  practice_pgdata:
