services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: practice
      POSTGRES_USER: ${POSTGRES_USER:-practice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - practice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-practice} -d practice"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: .
      target: prod
    profiles: ["bot"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-practice}:${POSTGRES_PASSWORD}@db/practice

  bot-dev:
    build:
      context: .
      target: dev
    profiles: ["bot-dev"]
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-practice}:${POSTGRES_PASSWORD}@db/practice
    volumes:
      - .:/app

volumes:
  practice_pgdata:
