name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      # Bootstrap skip: the coverage gate is meaningful only once bot/ has real
      # modules. Until then we only verify that the test tree collects cleanly
      # (conftest imports without errors). See CLAUDE.md "Gate honesty".
      - name: Detect bot modules
        id: botcheck
        run: |
          if find bot -name "*.py" ! -name "__init__.py" | grep -q .; then
            echo "has_modules=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_modules=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Tests with coverage
        if: steps.botcheck.outputs.has_modules == 'true'
        run: pytest --cov=bot --cov-report=term-missing --cov-fail-under=80
      - name: Collect-only sanity (bootstrap)
        if: steps.botcheck.outputs.has_modules == 'false'
        # pytest exits 5 when zero tests are collected — expected on the
        # bootstrap tree; anything else (e.g. ImportError = 2) must fail.
        run: pytest --collect-only || { code=$?; [ "$code" -eq 5 ] || exit "$code"; }

  build-push:
    runs-on: ubuntu-latest
    # Only build and push on pushes to main (not on PRs from forks — no registry access)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: prod
          push: true
          tags: ghcr.io/krabbi/tg-practice-companion:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
