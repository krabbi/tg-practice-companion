name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Pinned to match .pre-commit-config.yaml and the dev extra (pyproject.toml)
      # — keep all three in sync; ruff's format output is version-sensitive.
      - name: Install ruff
        run: pip install ruff==0.15.17
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: "postgresql+asyncpg://testuser:testpass@localhost:5432/testdb"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      # Bootstrap skip: the coverage gate is meaningful only once bot/ has real
      # modules. Until then we only verify that the test tree collects cleanly
      # (conftest imports without errors). See CLAUDE.md "Gate honesty".
      - name: Detect bot modules
        id: botcheck
        run: |
          if find bot -name "*.py" ! -name "__init__.py" | grep -q .; then
            echo "has_modules=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_modules=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Tests with coverage
        if: steps.botcheck.outputs.has_modules == 'true'
        run: |
          pytest --cov=bot --cov-report=term-missing --cov-report=json --cov-fail-under=80
          python scripts/check_coverage.py
      - name: Collect-only sanity (bootstrap)
        if: steps.botcheck.outputs.has_modules == 'false'
        # pytest exits 5 when zero tests are collected — expected on the
        # bootstrap tree; anything else (e.g. ImportError = 2) must fail.
        run: pytest --collect-only || { code=$?; [ "$code" -eq 5 ] || exit "$code"; }

  # Frontend gate for the Vue 3 + Vite SPA in `frontend/`.
  # The JOB always runs so a check named `frontend` always exists (the merge gate
  # in claude-pr-merge.yml keys off check names); the real steps activate only once
  # `frontend/package.json` lands — mirroring the bot-module bootstrap skip above.
  # Contract: `package.json` MUST define `typecheck`, `test` (Vitest), and `build`
  # (frontend tests are mandatory, but there is NO numeric coverage gate — the
  # pr-reviewer judges test adequacy). `lint` (ESLint) is recommended; it runs
  # with `--if-present` so a missing lint script does not break CI.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect frontend
        id: fe
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.fe.outputs.present == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        if: steps.fe.outputs.present == 'true'
        working-directory: frontend
        run: npm ci
      - name: Lint
        if: steps.fe.outputs.present == 'true'
        working-directory: frontend
        run: npm run lint --if-present
      - name: Typecheck
        if: steps.fe.outputs.present == 'true'
        working-directory: frontend
        run: npm run typecheck
      - name: Unit tests
        if: steps.fe.outputs.present == 'true'
        working-directory: frontend
        run: npm test
      - name: Build
        if: steps.fe.outputs.present == 'true'
        working-directory: frontend
        run: npm run build

  build-push:
    runs-on: ubuntu-latest
    # Only build and push on pushes to main (not on PRs from forks — no registry access)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: prod
          push: true
          tags: ghcr.io/krabbi/tg-practice-companion:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
