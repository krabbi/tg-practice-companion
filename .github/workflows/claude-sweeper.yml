name: Claude sweeper

# Queue sweeper: every 6 hours picks up one accumulated 'claude-ready' issue
# that the instant workflow missed (runner was asleep, subscription cap hit,
# job failed). Also recovers tasks stuck in claude-in-progress without a PR.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sweep:
    # Job-level concurrency keeps this in the shared claude-worker group
    # (strictly one task at a time, shared with claude-issue and the PR stages
    # — subscription-cap protection) while matching the other workflows so the
    # cross-stage cancellation race cannot recur.
    concurrency:
      group: claude-worker
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # claude-code-action needs id-token:write for OIDC auth; the agent also
    # creates branches/commits/PRs and edits issue labels, so contents/PRs/
    # issues are write, and actions:read lets it inspect CI results.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      # claude-code-action runs git (config/branch/commit/push); without a
      # checkout it dies with "fatal: not in a git directory". Full history so
      # the agent can branch from main and push cleanly.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pre-agent: find the target issue number so we can verify afterward.
      - name: Find target issue
        id: find-issue
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          # Find oldest open claude-ready issue without claude-in-progress and without an open PR
          ISSUE_NUMBER=$(gh issue list \
            --label "claude-ready" \
            --state open \
            --json number,labels,createdAt \
            --jq '.[] | select(.labels | map(.name) | contains(["claude-in-progress"]) | not) | .number' \
            2>/dev/null | tail -1 || true)

          # Also check for stuck tasks: claude-in-progress for >24h with no PR
          if [ -z "$ISSUE_NUMBER" ]; then
            STUCK=$(gh issue list \
              --label "claude-in-progress" \
              --state open \
              --json number,updatedAt \
              --jq '.[] | select((.updatedAt | fromdateiso8601) < (now - 86400)) | .number' \
              2>/dev/null | tail -1 || true)
            if [ -n "$STUCK" ]; then
              # Verify no open PR exists
              PR_EXISTS=$(gh pr list --state open --search "Closes #${STUCK}" --json number --jq 'length' 2>/dev/null || echo "0")
              if [ "$PR_EXISTS" = "0" ]; then
                gh issue edit "${STUCK}" --remove-label "claude-in-progress" || true
                ISSUE_NUMBER="$STUCK"
              fi
            fi
          fi

          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Target issue: ${ISSUE_NUMBER}"

      # Install the pre-commit hook in THIS runner so the agent's own
      # `git commit` auto-runs ruff + ruff-format (see claude-issue.yml for the
      # full rationale). Fast feedback loop; the post-agent "Enforce formatting"
      # step below is the deterministic backstop.
      - name: Install pre-commit hook for the agent
        if: steps.find-issue.outputs.issue_number != ''
        run: |
          pip install pre-commit
          pre-commit install
          pre-commit install-hooks

      - uses: anthropics/claude-code-action@v1
        id: claude
        if: steps.find-issue.outputs.issue_number != ''
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Найди через gh самый старый открытый issue с меткой claude-ready,
            без метки claude-in-progress и без привязанного открытого PR.
            Исключение: если у issue метка claude-in-progress стоит больше суток,
            а открытого PR по нему нет — задача застряла: сними метку и возьми
            этот issue заново.
            Если подходящих issue нет — заверши работу, ничего не делая.
            Если есть: поставь метку claude-in-progress, реши задачу в новой
            ветке, прогони тесты/линт, перед коммитом обязательно прогони
            `make format` (ruff format). В репозитории включён pre-commit хук:
            если коммит отклонён с "files were modified by this hook" — хук уже
            переформатировал файлы, сделай `git add -A` и закоммить снова.
            Открой PR с "Closes #N" в описании,
            оставь в issue комментарий со ссылкой на PR.
            Если issue непонятен — не выдумывай: задай уточняющие вопросы
            комментарием в issue и сними метку claude-in-progress.
            Только один issue за запуск.

            ГРАНИЦЫ РОЛИ — соблюдай строго:
            - Твоя работа ЗАКАНЧИВАЕТСЯ на открытии PR. НЕ делай code review,
              НЕ ставь аппрув, НЕ мержи PR (никаких `gh pr merge`), НЕ закрывай
              PR или issue вручную. Ревью, продуктовую приёмку и мерж выполняют
              отдельные staged-воркфлоу по меткам. Branch protection на этом
              репозитории недоступна — ты сам себе гейт, не вкатывай в main
              непроверенный код.
            - Локальный прогон тестов идёт по sqlite; финальный гейт — это CI на
              PR (реальный Postgres). НЕ объявляй задачу готовой по локальному
              прогону.
          # By default the action allows only file ops + read-only git +
          # comments, so the agent's gh/git/make/pytest calls were denied
          # (run 27470462321: permission_denials_count=8, is_error=true).
          # Bare "Bash" grants all shell commands; the rest let it edit files.
          # disallowedTools hard-blocks the merge/close subcommands so the
          # sweeper agent cannot bypass the staged gates (see claude-issue.yml).
          claude_args: |
            --max-turns 250
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep,MultiEdit"
            --disallowedTools "Bash(gh pr merge:*),Bash(gh pr close:*),Bash(gh issue close:*),Bash(gh pr review:*)"

      # Post-agent verification: find the PR opened for this issue.
      - name: Verify PR was created
        if: steps.find-issue.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.find-issue.outputs.issue_number }}"
          PR_URL=$(gh pr list --state open --search "Closes #${ISSUE_NUMBER}" --json url --jq '.[0].url' 2>/dev/null || true)
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr list --state open --json url,body --jq ".[] | select(.body | test(\"#${ISSUE_NUMBER}\")) | .url" 2>/dev/null | head -1 || true)
          fi
          if [ -z "$PR_URL" ]; then
            # No OPEN PR. Distinguish "opened nothing" from "agent overstepped and
            # already merged/closed a PR", bypassing the staged review + merge gates.
            CLOSED_PR=$(gh pr list --state all --search "Closes #${ISSUE_NUMBER}" --json number,state --jq '.[0] | "\(.number)\t\(.state)"' 2>/dev/null || true)
            if [ -n "$CLOSED_PR" ]; then
              PR_N=$(printf '%s' "$CLOSED_PR" | cut -f1)
              PR_STATE=$(printf '%s' "$CLOSED_PR" | cut -f2)
              gh issue comment "${ISSUE_NUMBER}" --body "[AUTOBOT ERROR] PR #${PR_N} for issue #${ISSUE_NUMBER} is already ${PR_STATE} — the sweeper agent merged/closed it itself, bypassing the staged review + CI merge gates. main may now contain unreviewed or CI-failing code. Manual intervention required."
            else
              gh issue comment "${ISSUE_NUMBER}" --body "[AUTOBOT ERROR] The sweeper agent ran but no PR was found for issue #${ISSUE_NUMBER}. Manual intervention required."
            fi
            # Release the queue lock and the ready opt-in: needs-human now owns
            # this issue, so neither the instant workflow nor the sweeper should
            # re-pick it.
            gh issue edit "${ISSUE_NUMBER}" --add-label "needs-human" \
              --remove-label "claude-in-progress" --remove-label "claude-ready" || true
            exit 1
          fi
          echo "PR found: ${PR_URL}"
          echo "PR_URL=${PR_URL}" >> "$GITHUB_ENV"
          echo "PR_NUMBER=$(echo "${PR_URL}" | grep -oE '[0-9]+$')" >> "$GITHUB_ENV"

      # Deterministic backstop: even if the agent bypassed the pre-commit hook
      # (e.g. `git commit --no-verify`), re-format the pushed branch and push a
      # fix only if something changed — so a formatting failure never reaches CI
      # (the PR #58 dance). Scope is intentionally JUST `ruff format`; genuine
      # `ruff check` errors are left for CI + the merge gate. See claude-issue.yml.
      - name: Enforce formatting on PR branch
        if: steps.find-issue.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
          AUTOMATION_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          BRANCH=$(gh pr view "${PR_NUMBER}" --json headRefName --jq .headRefName)

          git fetch origin "${BRANCH}"
          git checkout -f -B "${BRANCH}" "origin/${BRANCH}"

          pip install ruff==0.15.17 >/dev/null
          ruff format .

          if git diff --quiet; then
            echo "Formatting already clean on ${BRANCH} — no backstop commit needed."
          else
            echo "Agent left unformatted files — applying ruff format backstop."
            git config user.name "autobot"
            git config user.email "autobot@users.noreply.github.com"
            git add -A
            git commit -m "style: autobot ruff format backstop"
            # Push with the PAT, NOT the default GITHUB_TOKEN (the latter does not
            # re-trigger CI, leaving check-runs stuck on the old red commit).
            git push "https://x-access-token:${AUTOMATION_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:${BRANCH}"
            echo "Pushed formatting backstop commit to ${BRANCH}."
          fi

      # Tail: set needs-code-review on the PR and remove claude-ready from the
      # issue using the PAT so the label change re-triggers the review workflow.
      - name: Route to code review
        if: steps.find-issue.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.find-issue.outputs.issue_number }}"
          gh pr edit "${PR_NUMBER}" --add-label "needs-code-review"
          gh issue edit "${ISSUE_NUMBER}" --remove-label "claude-ready" || true
