name: Claude PR merge

# Triggered when a PR is labeled 'product-approved'.
# ALL bash — no agent. Verifies CI checks (lint + test must be success;
# skipped/neutral non-blocking per F3), waits for pending checks, then
# squash-merges and closes the linked issue via closingIssuesReferences (F7).
on:
  pull_request:
    types: [labeled]

jobs:
  merge:
    # Merge only on product-approved AND only if the PR is NOT parked for a human.
    # `needs-human` is a hard stop: without this guard, re-adding product-approved
    # on a needs-human PR would silently merge it past the stop flag. The labels in
    # github.event.pull_request reflect the PR state at the moment the label event
    # fired, so a PR that already carries needs-human is skipped here.
    if: >-
      github.event.label.name == 'product-approved' &&
      !contains(github.event.pull_request.labels.*.name, 'needs-human')
    # Deterministic anti-race (see claude-pr-review.yml for the full rationale):
    # only the stage whose label matched joins the shared `claude-worker` group
    # (serialises real Claude agents — subscription-cap protection); every other
    # fanned-out stage gets a unique throwaway group and cannot cancel the
    # matching stage's queued run.
    concurrency:
      group: "${{ github.event.label.name == 'product-approved' && 'claude-worker' || format('claude-skip-{0}', github.run_id) }}"
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      # checks: read is required for GITHUB_TOKEN to read the commit check-runs
      # endpoint used by the CI gate below. AUTOMATION_TOKEN (a PAT) is not used
      # for those reads because it may lack the fine-grained "Checks: read"
      # permission, which made gh api return an error body and break the gate.
      checks: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # F3: wait for CI checks to complete, then verify lint and test passed.
      # skipped/neutral conclusions are non-blocking (build-push is skipped on PRs).
      - name: Wait for and verify CI checks
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Waiting for CI checks on SHA: ${HEAD_SHA}"

          # Only the gate CI checks (lint, test) decide the merge. We must NOT wait
          # on every check run on the SHA: that set includes the sibling autobot
          # stages and this merge job's OWN check run (in_progress for the entire
          # poll), so counting them would never reach 0.
          #
          # ROOT CAUSE of the historical "0\n0 / integer expression expected" loop:
          # the previous code did `gh api ... 2>/dev/null || echo "{}"` and piped
          # that into a separate jq. When the API call failed, gh wrote its error
          # body (a JSON object) to STDOUT *and* exited non-zero, so `|| echo "{}"`
          # appended a second document. jq then emitted one integer PER document
          # ("0\n0"); PENDING carried a newline and `[ "$PENDING" -eq 0 ]` died with
          # "integer expression expected", looping to the 20-minute timeout on green
          # CI. The API failed because the read ran under AUTOMATION_TOKEN (a PAT
          # that may lack "Checks: read"). Fixes here:
          #   * read check-runs under GITHUB_TOKEN (has checks:read via permissions);
          #   * compute the pending count SERVER-SIDE with `gh --jq` (exactly one
          #     integer is printed, never a multi-document pipe);
          #   * detect API failure via gh's exit status and retry, instead of
          #     turning it into a bogus document.
          #
          # Fetch ALL check runs in a SINGLE request via ?per_page=100 (no
          # --paginate): a single page of up to 100 runs is one JSON object.
          MAX_POLLS=120
          POLL=0
          API_FAILURES=0
          GATE_READY=false
          while [ $POLL -lt $MAX_POLLS ]; do
            POLL=$((POLL + 1))

            if ! PENDING=$(GH_TOKEN="${{ github.token }}" gh api \
                  "repos/${{ github.repository }}/commits/${HEAD_SHA}/check-runs?per_page=100" \
                  --jq '[.check_runs[]? | select(.name == "lint" or .name == "test" or .name == "frontend") | select(.status == "queued" or .status == "in_progress")] | length' \
                  2>/dev/null); then
              API_FAILURES=$((API_FAILURES + 1))
              echo "Poll ${POLL}/${MAX_POLLS}: check-runs API call failed (${API_FAILURES} so far), retrying..."
              sleep 10
              continue
            fi

            # Defensive: strip everything but digits so an unexpected blank or
            # multi-line value can never crash the integer test below.
            PENDING=$(printf '%s' "$PENDING" | tr -cd '0-9')
            if [ -z "$PENDING" ]; then
              echo "Poll ${POLL}/${MAX_POLLS}: empty pending count, retrying..."
              sleep 10
              continue
            fi

            echo "Poll ${POLL}/${MAX_POLLS}: ${PENDING} gate check(s) still pending..."

            if [ "$PENDING" -eq 0 ]; then
              echo "All gate checks completed."
              GATE_READY=true
              break
            fi

            sleep 10
          done

          if [ "$GATE_READY" != "true" ]; then
            gh pr comment "${PR_NUMBER}" --body "[AUTOBOT ERROR] CI gate checks (lint, test) did not complete within 20 minutes (${API_FAILURES} API failures). Setting needs-human for manual review."
            gh pr edit "${PR_NUMBER}" --add-label "needs-human"
            exit 1
          fi

          # Verify lint and test passed (success required; skipped/neutral non-blocking).
          # Read once under GITHUB_TOKEN; a failed read is a hard error (do NOT
          # substitute a fallback document — that is what poisoned the poll loop).
          if ! CHECK_JSON=$(GH_TOKEN="${{ github.token }}" gh api \
                "repos/${{ github.repository }}/commits/${HEAD_SHA}/check-runs?per_page=100" \
                2>/dev/null); then
            gh pr comment "${PR_NUMBER}" --body "[AUTOBOT ERROR] Could not read CI check runs to verify conclusions. Setting needs-human for manual review."
            gh pr edit "${PR_NUMBER}" --add-label "needs-human"
            exit 1
          fi

          LINT_CONCLUSION=$(printf '%s' "$CHECK_JSON" | jq -r 'first(.check_runs[]? | select(.name == "lint") | .conclusion) // ""')
          TEST_CONCLUSION=$(printf '%s' "$CHECK_JSON" | jq -r 'first(.check_runs[]? | select(.name == "test") | .conclusion) // ""')
          FRONTEND_CONCLUSION=$(printf '%s' "$CHECK_JSON" | jq -r 'first(.check_runs[]? | select(.name == "frontend") | .conclusion) // ""')

          echo "lint conclusion: ${LINT_CONCLUSION}"
          echo "test conclusion: ${TEST_CONCLUSION}"
          echo "frontend conclusion: ${FRONTEND_CONCLUSION:-<absent>}"

          FAILED=false

          if [ "$LINT_CONCLUSION" != "success" ] && [ "$LINT_CONCLUSION" != "skipped" ] && [ "$LINT_CONCLUSION" != "neutral" ]; then
            echo "FAIL: lint check conclusion is '${LINT_CONCLUSION}' (required: success)"
            FAILED=true
          fi

          if [ "$TEST_CONCLUSION" != "success" ] && [ "$TEST_CONCLUSION" != "skipped" ] && [ "$TEST_CONCLUSION" != "neutral" ]; then
            echo "FAIL: test check conclusion is '${TEST_CONCLUSION}' (required: success)"
            FAILED=true
          fi

          # Frontend gate is non-blocking when ABSENT (PRs predating the SPA or this
          # gate carry no `frontend` check). When present, only a real failure blocks;
          # skipped (no frontend/ in the tree yet) / neutral / success all pass.
          if [ -n "$FRONTEND_CONCLUSION" ] && [ "$FRONTEND_CONCLUSION" != "success" ] && [ "$FRONTEND_CONCLUSION" != "skipped" ] && [ "$FRONTEND_CONCLUSION" != "neutral" ]; then
            echo "FAIL: frontend check conclusion is '${FRONTEND_CONCLUSION}' (required: success)"
            FAILED=true
          fi

          # If lint or test are missing entirely (not yet registered), treat as failure.
          if [ -z "$LINT_CONCLUSION" ]; then
            echo "FAIL: lint check not found"
            FAILED=true
          fi
          if [ -z "$TEST_CONCLUSION" ]; then
            echo "FAIL: test check not found"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            # A real check FAILURE (lint/test/frontend conclusion == "failure") is a
            # code problem the coder agent can fix. Route it back into the code-fix
            # loop instead of parking the PR for a human: add code-changes-requested,
            # which triggers claude-pr-fix ONLY (every other stage gets a throwaway
            # concurrency group and skips). That loop enforces the 5-round cap and
            # falls through to needs-human once exhausted, so a CI failure the agent
            # cannot actually fix still terminates — it can't ping-pong forever.
            #
            # A MISSING / unreadable gate check (lint or test absent) is an infra or
            # config anomaly the coder cannot fix; that path stays needs-human.
            if [ "$LINT_CONCLUSION" = "failure" ] || [ "$TEST_CONCLUSION" = "failure" ] || [ "$FRONTEND_CONCLUSION" = "failure" ]; then
              gh pr comment "${PR_NUMBER}" --body "[AUTOBOT CI FAILURE] A required CI check failed, so this PR cannot merge yet — routing it back to the code-fix loop (label: code-changes-requested). Failing conclusions → lint: ${LINT_CONCLUSION}, test: ${TEST_CONCLUSION}, frontend: ${FRONTEND_CONCLUSION:-<absent>}. Coder agent: read the failing run logs (\`gh pr checks ${PR_NUMBER}\`, \`gh run view <run-id> --log-failed\`), fix the root cause, and push. NOTE: the 'test' job runs against real Postgres — watch for FK-order / teardown / type-cast issues the local sqlite run misses. <!-- autobot:ci-failure -->"
              # Reset stale approvals so the PR state is honest and re-approval later
              # is a real 0->1 label transition that re-fires the downstream stages.
              gh pr edit "${PR_NUMBER}" --remove-label "product-approved" || true
              gh pr edit "${PR_NUMBER}" --remove-label "code-approved" || true
              gh pr edit "${PR_NUMBER}" --add-label "code-changes-requested"
              echo "CI gate failed (lint=${LINT_CONCLUSION}, test=${TEST_CONCLUSION}, frontend=${FRONTEND_CONCLUSION:-absent}) — routed back to code-fix loop."
              exit 1
            fi

            BODY="[AUTOBOT ERROR] CI gate checks missing or unreadable (lint: ${LINT_CONCLUSION:-<absent>}, test: ${TEST_CONCLUSION:-<absent>}). Cannot merge and cannot auto-fix. Setting needs-human for manual review."
            gh pr comment "${PR_NUMBER}" --body "${BODY}"
            gh pr edit "${PR_NUMBER}" --add-label "needs-human"
            exit 1
          fi

          echo "CI gate passed: lint=${LINT_CONCLUSION}, test=${TEST_CONCLUSION}"

      # Squash-merge the PR.
      - name: Squash merge PR
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          gh pr merge "${PR_NUMBER}" \
            --squash \
            --delete-branch \
            --subject "${PR_TITLE}" \
            --body "Auto-merged by Autobot v2 after lint+test CI gate passed and product-approved."

          echo "PR #${PR_NUMBER} squash-merged."

      # F7: close the linked issue via closingIssuesReferences (not body grep).
      - name: Close linked issues
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Use closingIssuesReferences from the GraphQL API (F7).
          ISSUE_NUMBERS=$(gh pr view "${PR_NUMBER}" \
            --json closingIssuesReferences \
            --jq '.closingIssuesReferences[].number' 2>/dev/null || true)

          if [ -z "$ISSUE_NUMBERS" ]; then
            echo "No closing issue references found for PR #${PR_NUMBER} — nothing to close."
          else
            for ISSUE_NUM in $ISSUE_NUMBERS; do
              echo "Closing issue #${ISSUE_NUM}..."
              gh issue close "${ISSUE_NUM}" \
                --comment "Implemented and merged in PR #${PR_NUMBER} by Autobot v2." \
                || echo "Warning: could not close issue #${ISSUE_NUM} (may already be closed)"
            done
          fi
