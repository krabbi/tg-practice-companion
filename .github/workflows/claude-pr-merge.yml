name: Claude PR merge

# Triggered when a PR is labeled 'product-approved'.
# ALL bash — no agent. Verifies CI checks (lint + test must be success;
# skipped/neutral non-blocking per F3), waits for pending checks, then
# squash-merges and closes the linked issue via closingIssuesReferences (F7).
on:
  pull_request:
    types: [labeled]

jobs:
  merge:
    if: github.event.label.name == 'product-approved'
    # Deterministic anti-race (see claude-pr-review.yml for the full rationale):
    # only the stage whose label matched joins the shared `claude-worker` group
    # (serialises real Claude agents — subscription-cap protection); every other
    # fanned-out stage gets a unique throwaway group and cannot cancel the
    # matching stage's queued run.
    concurrency:
      group: "${{ github.event.label.name == 'product-approved' && 'claude-worker' || format('claude-skip-{0}', github.run_id) }}"
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # F3: wait for CI checks to complete, then verify lint and test passed.
      # skipped/neutral conclusions are non-blocking (build-push is skipped on PRs).
      - name: Wait for and verify CI checks
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Waiting for CI checks on SHA: ${HEAD_SHA}"

          # Only the CI checks this gate actually verifies (lint, test) gate the
          # merge — see GATE_CHECKS. We must NOT wait on every check run on the
          # SHA: that set includes the sibling autobot stages and this merge job's
          # OWN check run, which is `in_progress` for the entire poll. Counting it
          # makes PENDING never reach 0 → 20-minute timeout → needs-human. (Earlier
          # merges only survived this by a race: the first poll fired before the
          # job's own check run was indexed; a SHA with many historical checks
          # loses that race.)
          GATE_CHECKS='["lint","test"]'

          # Poll until the gate CI checks (lint, test) are no longer pending.
          # Timeout after 20 minutes (120 x 10s polls).
          MAX_POLLS=120
          POLL=0
          while [ $POLL -lt $MAX_POLLS ]; do
            POLL=$((POLL + 1))

            # Fetch check runs with `--paginate --slurp`: this ALWAYS returns a
            # single JSON document — an array of per-page objects — even when the
            # API spreads results over multiple pages (a SHA re-run by CI can
            # accumulate >30 check runs). Do NOT use gh's `--jq` here (it is also
            # incompatible with --slurp); pipe the raw array into local jq and
            # flatten .check_runs across pages. This guarantees jq emits exactly
            # one integer: without --slurp, multi-document output made jq print one
            # length per document, so PENDING became e.g. "0\n0" and the `[ -eq ]`
            # test below died with "integer expression expected", looping to the
            # 20-minute timeout and flagging needs-human even on green CI.
            # (// [] guards a failed API call that falls back to '[]'.)
            CHECK_JSON=$(gh api --paginate --slurp "repos/${{ github.repository }}/commits/${HEAD_SHA}/check-runs" 2>/dev/null || echo "[]")

            # Count gate checks still in progress (flattened across all pages).
            PENDING=$(echo "$CHECK_JSON" | \
              jq --argjson gate "$GATE_CHECKS" '[.[] | (.check_runs // [])[] | select(.name as $n | $gate | index($n)) | select(.status == "queued" or .status == "in_progress")] | length')

            echo "Poll ${POLL}/${MAX_POLLS}: ${PENDING} check(s) still pending..."

            if [ "$PENDING" -eq 0 ]; then
              echo "All checks completed."
              break
            fi

            if [ $POLL -ge $MAX_POLLS ]; then
              gh pr comment "${PR_NUMBER}" --body "[AUTOBOT ERROR] CI checks timed out after 20 minutes waiting for completion. Setting needs-human for manual review."
              gh pr edit "${PR_NUMBER}" --add-label "needs-human"
              exit 1
            fi

            sleep 10
          done

          # Verify lint and test checks passed (success required; skipped = non-blocking).
          # Same `--paginate --slurp` + local jq pattern as the polling step above:
          # one JSON array document, flattened across pages.
          CHECK_JSON=$(gh api --paginate --slurp "repos/${{ github.repository }}/commits/${HEAD_SHA}/check-runs" 2>/dev/null || echo "[]")

          LINT_CONCLUSION=$(echo "$CHECK_JSON" | jq -r '.[] | (.check_runs // [])[] | select(.name == "lint") | .conclusion' | head -1)
          TEST_CONCLUSION=$(echo "$CHECK_JSON" | jq -r '.[] | (.check_runs // [])[] | select(.name == "test") | .conclusion' | head -1)

          echo "lint conclusion: ${LINT_CONCLUSION}"
          echo "test conclusion: ${TEST_CONCLUSION}"

          FAILED=false

          if [ "$LINT_CONCLUSION" != "success" ] && [ "$LINT_CONCLUSION" != "skipped" ] && [ "$LINT_CONCLUSION" != "neutral" ]; then
            echo "FAIL: lint check conclusion is '${LINT_CONCLUSION}' (required: success)"
            FAILED=true
          fi

          if [ "$TEST_CONCLUSION" != "success" ] && [ "$TEST_CONCLUSION" != "skipped" ] && [ "$TEST_CONCLUSION" != "neutral" ]; then
            echo "FAIL: test check conclusion is '${TEST_CONCLUSION}' (required: success)"
            FAILED=true
          fi

          # If lint or test are missing entirely (not yet registered), treat as failure.
          if [ -z "$LINT_CONCLUSION" ]; then
            echo "FAIL: lint check not found"
            FAILED=true
          fi
          if [ -z "$TEST_CONCLUSION" ]; then
            echo "FAIL: test check not found"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            BODY="[AUTOBOT ERROR] CI checks failed or not found. Cannot merge. lint: ${LINT_CONCLUSION}, test: ${TEST_CONCLUSION}. Setting needs-human for manual review."
            gh pr comment "${PR_NUMBER}" --body "${BODY}"
            gh pr edit "${PR_NUMBER}" --add-label "needs-human"
            exit 1
          fi

          echo "CI gate passed: lint=${LINT_CONCLUSION}, test=${TEST_CONCLUSION}"

      # Squash-merge the PR.
      - name: Squash merge PR
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          gh pr merge "${PR_NUMBER}" \
            --squash \
            --delete-branch \
            --subject "${PR_TITLE}" \
            --body "Auto-merged by Autobot v2 after lint+test CI gate passed and product-approved."

          echo "PR #${PR_NUMBER} squash-merged."

      # F7: close the linked issue via closingIssuesReferences (not body grep).
      - name: Close linked issues
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Use closingIssuesReferences from the GraphQL API (F7).
          ISSUE_NUMBERS=$(gh pr view "${PR_NUMBER}" \
            --json closingIssuesReferences \
            --jq '.closingIssuesReferences[].number' 2>/dev/null || true)

          if [ -z "$ISSUE_NUMBERS" ]; then
            echo "No closing issue references found for PR #${PR_NUMBER} — nothing to close."
          else
            for ISSUE_NUM in $ISSUE_NUMBERS; do
              echo "Closing issue #${ISSUE_NUM}..."
              gh issue close "${ISSUE_NUM}" \
                --comment "Implemented and merged in PR #${PR_NUMBER} by Autobot v2." \
                || echo "Warning: could not close issue #${ISSUE_NUM} (may already be closed)"
            done
          fi
