name: Claude on ready issue

# Instant reaction: runs when an issue is opened already carrying the
# 'claude-ready' label, or when the label is added later. The label is an
# explicit operator opt-in — without it the automation never touches an issue
# (protects pre-existing backlog issues and the subscription cap).
on:
  issues:
    types: [opened, labeled]

jobs:
  solve:
    # Two-part guard. (1) The issue must carry claude-ready at all. (2) On a
    # `labeled` event, the ADDED label must itself be claude-ready — otherwise
    # the agent labelling the issue claude-in-progress mid-run fires a second
    # `labeled` event whose actor is claude[bot], and claude-code-action's
    # non-human-actor guard kills that run (and it would otherwise duplicate the
    # in-flight task). On `opened`, github.event.label is null, so the OR clause
    # lets it through. Service labels (claude-in-progress, needs-human, …) no
    # longer self-trigger this workflow.
    if: |
      contains(github.event.issue.labels.*.name, 'claude-ready')
      && (github.event.action != 'labeled' || github.event.label.name == 'claude-ready')
    # Deterministic anti-race (see claude-pr-review.yml). This workflow fires on
    # issues opened/labeled; only an issue that actually carries claude-ready
    # joins the shared `claude-worker` group (strictly one Claude agent at a
    # time, shared with the sweeper and PR stages — subscription-cap protection).
    # Any other issue event gets a unique throwaway group so it cannot cancel a
    # queued real task. Checks the label set (not github.event.label) so it is
    # correct for both `opened` and `labeled` events.
    concurrency:
      group: "${{ contains(github.event.issue.labels.*.name, 'claude-ready') && 'claude-worker' || format('claude-skip-{0}', github.run_id) }}"
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # claude-code-action needs id-token:write for OIDC auth; the agent also
    # creates branches/commits/PRs and edits issue labels, so contents/PRs/
    # issues are write, and actions:read lets it inspect CI results.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      # claude-code-action runs git (config/branch/commit/push); without a
      # checkout it dies with "fatal: not in a git directory". Full history so
      # the agent can branch from main and push cleanly.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install the pre-commit hook in THIS runner so the agent's own
      # `git commit` calls auto-run ruff + ruff-format. The hook lives in
      # .git/hooks/ (never committed), so without this step it protects nobody —
      # which is exactly how PR #58 shipped an unformatted commit. install-hooks
      # pre-builds the hook env so the agent's first commit can't stall/fail on a
      # cold network mid-commit. This is the fast feedback loop; the post-agent
      # "Enforce formatting" step below is the deterministic backstop.
      - name: Install pre-commit hook for the agent
        run: |
          pip install pre-commit
          pre-commit install
          pre-commit install-hooks

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Реши issue #${{ github.event.issue.number }} в этом репозитории.
            Порядок: поставь на issue метку claude-in-progress (gh issue edit),
            изучи требование, реализуй в новой ветке, прогони тесты/линт,
            перед коммитом обязательно прогони `make format` (ruff format).
            В репозитории включён pre-commit хук: если коммит отклонён с
            "files were modified by this hook" — хук уже переформатировал файлы,
            просто сделай `git add -A` и закоммить снова.
            Открой PR с "Closes #${{ github.event.issue.number }}" в описании,
            оставь в issue комментарий со ссылкой на PR.
            Если issue непонятен — не выдумывай: задай уточняющие вопросы
            комментарием в issue и сними метку claude-in-progress.

            ГРАНИЦЫ РОЛИ — соблюдай строго:
            - Ты — ТОЛЬКО разработчик (coder). Ты НЕ ревьюер и НЕ продакт-менеджер.
              Твоя работа ЗАКАНЧИВАЕТСЯ на открытии PR. НЕ делай code review,
              НЕ делай продуктовую приёмку, НЕ ставь аппрув, НЕ мержи PR (никаких
              `gh pr merge`), НЕ закрывай PR или issue вручную. Ревью, продуктовую
              приёмку и мерж выполняют отдельные staged-воркфлоу, запускаемые по
              меткам. Если ты смержишь PR сам — ты в обход всех гейтов вкатишь в
              main непроверенный код (branch protection на этом репозитории
              недоступна, ты — гейт).
            - ЗАПРЕЩЕНО изображать ревью. НЕ оценивай собственный код, НЕ пиши
              комментариев вида «pr-reviewer APPROVED», «CHANGES REQUESTED»,
              «PRODUCT APPROVED/REQUESTED», НЕ выставляй вердиктов и НЕ постируй
              verdict-маркеров (`<!-- autobot:*-verdict:* -->`). Эти комментарии и
              метки ставят ТОЛЬКО staged-воркфлоу ревью; если ты сам их напишешь,
              ты подменишь собой гейт и собьёшь пайплайн. Любые «замечания к
              качеству» по своему коду исправляй прямо в коде до открытия PR, а не
              оформляй ревью-комментарием.
            - НЕ комментируй PR (никаких `gh pr comment`). Единственный комментарий,
              который ты оставляешь, — ОДИН комментарий в ISSUE (`gh issue comment`)
              со ссылкой на открытый PR. Больше никаких комментариев нигде.
            - НЕ читай `.claude/orchestration.md` — это описание мульти-агентного
              пайплайна (ревью/приёмка/мерж), и оно НЕ нужно для реализации issue.
              Твой контекст — `CLAUDE.md`, `.claude/coding-patterns.md`,
              `.claude/testing-guide.md`, `docs/`. Знание чужого флоу тебе только
              мешает и провоцирует выход за роль.
            - Локальный прогон тестов идёт по sqlite; финальный гейт — это CI на
              PR (реальный Postgres). НЕ объявляй задачу готовой по локальному
              прогону: дождись зелёного CI или хотя бы не утверждай, что «все
              тесты прошли», если ты не видел зелёный CI на PR.
            - Финал: один комментарий в issue со ссылкой на открытый PR — и стоп.
          # By default the action allows only file ops + read-only git +
          # comments, so the agent's gh/git/make/pytest calls were denied
          # (run 27470462321: permission_denials_count=8, is_error=true).
          # Bare "Bash" grants all shell commands; the rest let it edit files.
          # disallowedTools is the deterministic backstop for the role boundary
          # above: with no branch protection available (private repo, free plan)
          # the prompt alone is the only guard, so we also hard-block the gh
          # subcommands that would let the agent merge/close past the staged
          # gates (see PR that introduced this; root cause: a single issue agent
          # self-merged a red PR, bypassing review + the CI merge gate).
          # `gh pr comment` is also blocked: the agent's only allowed comment is
          # ONE link in the issue (`gh issue comment`). Without this block a coder
          # run masqueraded as the review pipeline by posting "pr-reviewer
          # APPROVED" / "PRODUCT CHANGES REQUESTED" comments straight on the PR
          # (PR #62, 2026-06-15) — confusing, and a self-review the staged
          # workflows are supposed to own. `gh pr review` is already blocked.
          claude_args: |
            --max-turns 250
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep,MultiEdit"
            --disallowedTools "Bash(gh pr merge:*),Bash(gh pr close:*),Bash(gh issue close:*),Bash(gh pr review:*),Bash(gh pr comment:*)"

      # Post-agent verification: find the PR opened for this issue.
      # conclusion:success on the action does NOT mean the agent succeeded —
      # the action swallows is_error. We verify by checking a real artifact.
      - name: Verify PR was created
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          PR_URL=$(gh pr list --state open --search "Closes #${ISSUE_NUMBER}" --json url --jq '.[0].url' 2>/dev/null || true)
          if [ -z "$PR_URL" ]; then
            # Try searching by issue reference in body
            PR_URL=$(gh pr list --state open --json url,body --jq ".[] | select(.body | test(\"#${ISSUE_NUMBER}\")) | .url" 2>/dev/null | head -1 || true)
          fi
          if [ -z "$PR_URL" ]; then
            # No OPEN PR. Distinguish "agent opened nothing" from "agent overstepped
            # and already merged/closed a PR" — the latter means it bypassed the
            # staged review/merge gates, which is a much more serious anomaly and
            # was previously masked behind a misleading "no PR found" message.
            CLOSED_PR=$(gh pr list --state all --search "Closes #${ISSUE_NUMBER}" --json number,state,url --jq '.[0] | "\(.number)\t\(.state)\t\(.url)"' 2>/dev/null || true)
            if [ -n "$CLOSED_PR" ]; then
              PR_N=$(printf '%s' "$CLOSED_PR" | cut -f1)
              PR_STATE=$(printf '%s' "$CLOSED_PR" | cut -f2)
              gh issue comment "${ISSUE_NUMBER}" --body "[AUTOBOT ERROR] PR #${PR_N} for issue #${ISSUE_NUMBER} is already ${PR_STATE} — the issue agent merged/closed it itself, bypassing the staged review + CI merge gates. main may now contain unreviewed or CI-failing code. Manual intervention required: verify main is green and that the change passed review."
            else
              gh issue comment "${ISSUE_NUMBER}" --body "[AUTOBOT ERROR] The coder agent ran but no PR was found for issue #${ISSUE_NUMBER}. Manual intervention required."
            fi
            # Release the queue lock and the ready opt-in: needs-human now owns
            # this issue, so neither the instant workflow nor the sweeper should
            # re-pick it. Without this the issue stays stuck in claude-in-progress
            # for up to 24h until the sweeper's stale-lock recovery fires.
            gh issue edit "${ISSUE_NUMBER}" --add-label "needs-human" \
              --remove-label "claude-in-progress" --remove-label "claude-ready" || true
            exit 1
          fi
          echo "PR found: ${PR_URL}"
          echo "PR_URL=${PR_URL}" >> "$GITHUB_ENV"

      # Deterministic backstop: even if the agent bypassed the pre-commit hook
      # (e.g. `git commit --no-verify`), the PR branch must not reach CI with a
      # formatting failure (the PR #58 dance: red lint -> merge gate -> needs-human).
      # We re-format the pushed branch and, only if something changed, push a fix.
      # Scope is intentionally JUST `ruff format` (whitespace/layout — always safe
      # to auto-apply); genuine `ruff check` lint errors are real defects left for
      # CI + the merge gate to surface, not silently auto-fixed.
      - name: Enforce formatting on PR branch
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
          AUTOMATION_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          PR_NUMBER=$(echo "${PR_URL}" | grep -oE '[0-9]+$')
          BRANCH=$(gh pr view "${PR_NUMBER}" --json headRefName --jq .headRefName)

          git fetch origin "${BRANCH}"
          git checkout -f -B "${BRANCH}" "origin/${BRANCH}"

          pip install ruff==0.15.17 >/dev/null
          ruff format .

          if git diff --quiet; then
            echo "Formatting already clean on ${BRANCH} — no backstop commit needed."
          else
            echo "Agent left unformatted files — applying ruff format backstop."
            git config user.name "autobot"
            git config user.email "autobot@users.noreply.github.com"
            git add -A
            git commit -m "style: autobot ruff format backstop"
            # Push with the PAT, NOT the default GITHUB_TOKEN: pushes made with
            # GITHUB_TOKEN do not re-trigger CI (anti-recursion), which would leave
            # the PR's check-runs stuck on the old red commit.
            #
            # The push must NOT be allowed to fail the whole job. It did on PR #62
            # (2026-06-15): the PAT push was rejected ("Invalid username or token")
            # while the SAME token worked for gh API calls in this job, the step
            # exited 128 under `bash -e`, and the tail "Route to code review" step
            # was skipped — so needs-code-review was never set and the PR was
            # stranded with no label while the issue stayed locked. The format
            # backstop is best-effort: CI's `lint` job + the merge gate are the
            # real formatting gate, so a failed backstop push must degrade to a
            # warning and let routing to review proceed, not block the pipeline.
            if git push "https://x-access-token:${AUTOMATION_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:${BRANCH}"; then
              echo "Pushed formatting backstop commit to ${BRANCH}."
            else
              echo "WARNING: formatting backstop push failed — continuing to review anyway."
              gh pr comment "${PR_NUMBER}" --body "[AUTOBOT] ruff-format backstop push failed (check AUTOMATION_TOKEN validity for git push). Proceeding to code review regardless — CI \`lint\` and the merge gate remain the authoritative formatting gate. <!-- autobot:format-backstop-push-failed -->" || true
            fi
          fi

      # Tail: set needs-code-review on the PR and remove claude-ready from the
      # issue using the PAT so the label change re-triggers the review workflow.
      - name: Route to code review
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          PR_NUMBER=$(echo "${PR_URL}" | grep -oE '[0-9]+$')
          gh pr edit "${PR_NUMBER}" --add-label "needs-code-review"
          gh issue edit "${ISSUE_NUMBER}" --remove-label "claude-ready" || true
