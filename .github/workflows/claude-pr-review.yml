name: Claude PR code review

# Triggered when a PR is labeled 'needs-code-review'.
# A reviewer agent reads the diff, posts a structured review comment,
# then appends a hidden-marker verdict comment.
# Post-agent bash reads the verdict and sets code-approved or
# code-changes-requested using the PAT so the next workflow fires.
on:
  pull_request:
    types: [labeled]

jobs:
  review:
    if: github.event.label.name == 'needs-code-review'
    # Deterministic anti-race. All five PR-stage workflows subscribe to the same
    # `labeled` event, so a single label fans out to five workflow runs. To stop
    # them fighting over one concurrency slot (the bug that stranded #37/#39):
    # only the stage whose label ACTUALLY matched joins the shared `claude-worker`
    # group — which serialises real Claude agents (subscription-cap protection).
    # Every other fanned-out stage gets a unique throwaway group and so can never
    # cancel the matching stage's queued run. This holds regardless of whether an
    # if-skipped job claims a concurrency slot (an undocumented GitHub detail), so
    # the fix does not depend on that behaviour.
    concurrency:
      group: "${{ github.event.label.name == 'needs-code-review' && 'claude-worker' || format('claude-skip-{0}', github.run_id) }}"
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # F5: remove both outcome labels before running the agent so a stale
      # label from a previous round cannot pass the post-agent check.
      #
      # Also remove our OWN trigger label (needs-code-review): GitHub emits no
      # `labeled` event when a label is re-added that already exists, so if this
      # stage left needs-code-review in place, the code-fix stage's
      # `--add-label needs-code-review` (its way of restarting review after a fix)
      # would be a silent no-op and the pipeline would stall after the first fix
      # round. Clearing it here when we take the PR makes that re-add a real
      # 0->1 transition that fires this workflow again.
      - name: Clear trigger and outcome labels
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh pr edit "${PR_NUMBER}" --remove-label "needs-code-review" || true
          gh pr edit "${PR_NUMBER}" --remove-label "code-approved" || true
          gh pr edit "${PR_NUMBER}" --remove-label "code-changes-requested" || true

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the pr-reviewer agent for the tg-practice-companion project.
            Review PR #${{ github.event.pull_request.number }} on branch
            ${{ github.event.pull_request.head.ref }}.

            Fetch the full diff with: gh pr diff ${{ github.event.pull_request.number }}
            Then inspect relevant source files as needed.

            NOTE: this PR may have been reviewed before and restarted from the top
            (e.g. after a subscription-limit pause). Judge the CURRENT diff and code
            on its own merits — earlier review comments may be stale; do not assume a
            prior verdict still holds.

            Review checklist:
            - Architecture: Handler → Service → Repository layers respected (no skipping)
            - Tests: new code has unit tests, coverage maintained
            - Security: no secrets hardcoded, html.escape on LLM/user content
            - Cost logging: every LLM/API call records tokens+cost via usage service (AC-16)
            - CBT tone pinned in all LLM prompts, no criticism/unsolicited advice (AC-13)
            - i18n: all user-facing strings via t(key, lang), no hardcoded UI text (AC-14)
            - DB migrations correct; schema in docs/architecture.md updated
            - ruff lint and format pass
            - IMPORTANT: the agent runs pytest locally against sqlite, but CI's 'test' job
              uses real Postgres — watch for FK-order / teardown issues sqlite misses.

            Post a detailed review comment on the PR with your findings.

            Then post a SECOND comment containing EXACTLY one of these two lines
            (and nothing else on that line) so the automation can parse it:
              <!-- autobot:code-review-verdict:APPROVED -->
              <!-- autobot:code-review-verdict:CHANGES_REQUESTED -->

            Use APPROVED only if there are no blocking issues.
            Use CHANGES_REQUESTED if ANY blocking issue is found.
          claude_args: |
            --max-turns 50
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep,MultiEdit"

      # Subscription-limit guard (shared shape across all PR stages).
      # claude-code-action swallows is_error and reports the GH step as success,
      # so a 5-hour-cap-exhausted run (returns in <1s, is_error=true, num_turns<=1,
      # subtype reported as "success") would otherwise fall through to the
      # "no verdict" branch and burn the PR into needs-human — or, on older
      # versions, flip labels and ping-pong (the 47-min loop on PR #57 2026-06-15,
      # 75 real degenerate runs). Detect it from the execution output and PAUSE
      # instead: tag autobot-paused and stop. claude-pr-resume.yml restarts the
      # flow from code review once the cap resets. We key off is_error (NOT
      # subtype — on a cap hit subtype lies "success"); only error_max_turns is a
      # genuine "couldn't finish" and is left to the normal needs-human path.
      - name: Pause on subscription-limit exhaustion
        id: limitcheck
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          FILE="${{ steps.claude.outputs.execution_file }}"
          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            FILE="${RUNNER_TEMP}/claude-execution-output.json"
          fi
          IS_ERROR=""; SUBTYPE=""
          if [ -f "$FILE" ]; then
            IS_ERROR=$(jq -rs 'flatten | map(select(.type=="result")) | last | .is_error // empty' "$FILE" 2>/dev/null || true)
            SUBTYPE=$(jq -rs 'flatten | map(select(.type=="result")) | last | .subtype // empty' "$FILE" 2>/dev/null || true)
          fi
          echo "execution result: is_error=${IS_ERROR:-?} subtype=${SUBTYPE:-?}"
          if [ "$IS_ERROR" = "true" ] && [ "$SUBTYPE" != "error_max_turns" ]; then
            PAUSES=$(gh pr view "$PR_NUMBER" --json comments \
              --jq '[.comments[].body | select(contains("<!-- autobot:pause-count -->"))] | length' 2>/dev/null || echo 0)
            if [ "${PAUSES:-0}" -ge 3 ]; then
              gh pr comment "$PR_NUMBER" --body "[AUTOBOT] Paused ${PAUSES}× on agent errors — not a transient subscription-limit hit anymore. Setting needs-human."
              gh pr edit "$PR_NUMBER" --remove-label "autobot-paused" || true
              gh pr edit "$PR_NUMBER" --add-label "needs-human"
            else
              gh pr comment "$PR_NUMBER" --body "[AUTOBOT] Agent returned is_error with no usable result (subtype=${SUBTYPE:-none}) — most likely the Claude subscription 5-hour limit is exhausted. Pausing; claude-pr-resume restarts the review flow once the limit resets. <!-- autobot:pause-count -->"
              gh pr edit "$PR_NUMBER" --add-label "autobot-paused"
            fi
            echo "paused=true" >> "$GITHUB_OUTPUT"
          else
            echo "paused=false" >> "$GITHUB_OUTPUT"
          fi

      # Post-agent verification: find the verdict comment and set the label.
      - name: Parse verdict and set label
        if: steps.limitcheck.outputs.paused != 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Give the comment a moment to appear (API propagation)
          sleep 5

          # Collect verdict text from BOTH channels: issue comments (gh pr view --json
          # comments) and PR reviews (pulls/{n}/reviews). The agent may post its verdict
          # via either channel depending on which tool it picks; reading only one channel
          # causes the "no verdict" false-negative that strands PRs in needs-human.
          COMMENTS=$(gh pr view "${PR_NUMBER}" --json comments --jq '.comments[].body' 2>/dev/null || true)
          REVIEWS=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" --jq '.[].body' 2>/dev/null || true)
          HAYSTACK="${COMMENTS}"$'\n'"${REVIEWS}"

          if echo "$HAYSTACK" | grep -q '<!-- autobot:code-review-verdict:APPROVED -->'; then
            echo "Verdict: APPROVED"
            gh pr edit "${PR_NUMBER}" --add-label "code-approved"
          elif echo "$HAYSTACK" | grep -q '<!-- autobot:code-review-verdict:CHANGES_REQUESTED -->'; then
            echo "Verdict: CHANGES_REQUESTED"
            gh pr edit "${PR_NUMBER}" --add-label "code-changes-requested"
          else
            # No verdict found in either channel — agent failed silently
            gh pr comment "${PR_NUMBER}" --body "[AUTOBOT ERROR] The reviewer agent ran but posted no verdict comment (checked both issue comments and PR reviews). Manual intervention required."
            gh pr edit "${PR_NUMBER}" --add-label "needs-human"
            exit 1
          fi
